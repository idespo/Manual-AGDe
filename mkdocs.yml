site_name: Manual de uso del AGDe
theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  language: es
  features:
    - search.suggest
    - navigation.footer
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow
    - toc.integrate 



nav:
  - Inicio: index.md
  - Guía de uso:
    - Ingreso: uso/ingreso.md
    - Visualización: uso/visualizacion.md
    - Recepción de documentos: uso/recep_docs.md
    - Trámite de documentos: uso/trami_docs.md
    - Elaboración de documentos: uso/elabo_docs.md
    - Validación de documentos: uso/vali_docs.md
    - Despacho: uso/despacho_docs.md
    - Archivo:
      - Sistema de clasificaión: uso/archivo/sistem_clasifi.md
      - Expedientes: 
        - Funcionales: uso/archivo/funcionales.md
        - Asuntos: uso/archivo/asuntos.md
  - Acerca de: about.md



markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: python:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: "#"

plugins:
  - search
  - git-revision-date-localized
  - awesome-pages
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/IDESPOUNA
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/idespo_una/
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@idespouna1975

copyright: 'Copyright &copy; 2026 - <span id="current-year"></span> <script>document.getElementById("current-year").innerHTML = new Date().getFullYear();</script> Livan Gómez'