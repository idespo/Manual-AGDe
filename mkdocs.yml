site_name: Manual de uso
theme:
  name: material

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: python:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - footnotes
  - tables

plugins:
  - search
  - git-revision-date-localized
  - awesome-pages
  - minify:
      minify_html: true
